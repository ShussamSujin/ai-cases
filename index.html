* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 24px;
}

header {
  padding: 48px 0 32px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

header h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  text-wrap: balance;
  margin-bottom: 8px;
}

header .subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  flex-wrap: wrap;
  margin: 24px 0 0;
}

.stat-item { text-align: center; }

.stat-num {
  font-size: 32px;
  font-weight: 800;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.stat-label {
  font-size: 12px;
  color: var(--text-tertiary);
  letter-spacing: 0.05em;
}

/* TAB NAV */
.tab-nav {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin: 28px 0 0;
}

.tab-btn {
  padding: 12px 24px;
  border: none;
  background: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-tertiary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s;
}

.tab-btn:hover { color: var(--text); }

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* DASHBOARD */
.dashboard {
  padding: 28px 0 32px;
}

.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.dash-card.full { grid-column: 1 / -1; }

.dash-card h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.dash-card h3 span { font-size: 18px; }

.bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.bar-label {
  font-size: 12px;
  color: var(--text-secondary);
  width: 130px;
  flex-shrink: 0;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bar-track {
  flex: 1;
  height: 20px;
  background: var(--surface-alt);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
  min-width: 2px;
}

.bar-value {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  width: 28px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.donut-row {
  display: flex;
  align-items: center;
  gap: 24px;
}

.donut-container {
  width: 140px;
  height: 140px;
  flex-shrink: 0;
}

.donut-legend {
  flex: 1;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-count {
  margin-left: auto;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}

.insight-box {
  background: var(--accent-light);
  border-radius: 8px;
  padding: 16px 20px;
  margin-top: 12px;
}

.insight-box p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.insight-box strong { color: var(--text); }

/* FILTER */
.filter-section {
  padding: 20px 0;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
  border-bottom: 1px solid var(--border);
}

.filter-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.06em;
  margin-right: 4px;
}

.filter-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}

.filter-btn:hover { border-color: var(--accent); color: var(--accent); }

.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.filter-btn[data-level="초등"].active { background: var(--level-elem); border-color: var(--level-elem); }
.filter-btn[data-level="중등"].active { background: var(--level-mid); border-color: var(--level-mid); }
.filter-btn[data-level="고등"].active { background: var(--level-high); border-color: var(--level-high); }

.search-input {
  flex: 1;
  min-width: 180px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
}

.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.search-input::placeholder { color: var(--text-tertiary); }

/* CATEGORIES */
.categories { padding: 28px 0 48px; }
.category { margin-bottom: 36px; }

.cat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  cursor: pointer;
  user-select: none;
}

.cat-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.cat-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }

.cat-count {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-left: 4px;
  font-variant-numeric: tabular-nums;
}

.cat-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 14px;
  padding-left: 52px;
}

.cat-toggle {
  margin-left: auto;
  font-size: 18px;
  color: var(--text-tertiary);
  transition: transform 0.2s;
}

.cat-toggle.collapsed { transform: rotate(-90deg); }

.case-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
  padding-left: 52px;
}

.case-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: box-shadow 0.15s, border-color 0.15s;
  cursor: default;
}

.case-card:hover { box-shadow: var(--shadow-lg); border-color: var(--accent); }

.case-card .card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.level-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.03em;
}

.level-badge.elem { background: var(--cat1-bg); color: var(--level-elem); }
.level-badge.mid { background: var(--cat3-bg); color: var(--level-mid); }
.level-badge.high { background: var(--cat2-bg); color: var(--level-high); }

.card-school { font-size: 13px; font-weight: 600; color: var(--text); }

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.45;
}

.card-summary {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-summary.expanded { -webkit-line-clamp: unset; }

.card-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}

.tool-tag {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--surface-alt);
  color: var(--text-secondary);
}

.card-subject {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 8px;
}

.card-expand {
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  margin-top: 4px;
  border: none;
  background: none;
  font-family: inherit;
  padding: 0;
}

.hidden { display: none !important; }

footer {
  padding: 32px 0;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 12px;
  color: var(--text-tertiary);
}

@media (max-width: 640px) {
  header h1 { font-size: 22px; }
  .stats-bar { gap: 20px; }
  .stat-num { font-size: 24px; }
  .dash-grid { grid-template-columns: 1fr; }
  .case-grid { grid-template-columns: 1fr; padding-left: 0; }
  .cat-desc { padding-left: 0; }
  .filter-row { gap: 6px; }
  .donut-row { flex-direction: column; }
  .tab-btn { padding: 10px 14px; font-size: 13px; }
  .bar-label { width: 90px; font-size: 11px; }
}
</style>

function buildDashboard() {
  const visible = CASES.filter(c => !c.hidden);

  // 1. Tool frequency
  const toolCount = {};
  visible.forEach(c => c.tools.forEach(t => {
    const n = normTool(t);
    toolCount[n] = (toolCount[n] || 0) + 1;
  }));
  const toolRank = Object.entries(toolCount).sort((a,b) => b[1]-a[1]);
  const uniqueTools = toolRank.length;
  document.getElementById('tool-count').textContent = uniqueTools;

  // 2. AI tool categories
  const aiGenTools = ['ChatGPT','Claude','Gemini','뤼튼','E-GPT','Mizou','생성형 AI','AI 질문 챗봇','AI 챗봇','Elice AI','아이쌤GPT','마이클AI'];
  const aiCourseTools = ['스쿨플랫','매쓰홀릭','풀리수학','러니','원아워','클래스팅','클래스카드','AI 코스웨어','수학 AI 코스웨어','리딩오션스쿨','리드포스쿨','AI 아크수학','수학 아레나','체리팟','똑똑수학탐험대','토도한글'];
  const aiFeedbackTools = ['클리포','Brisk Teaching','채움AI','Snorkl','센스쿨'];
  const vibecodeTools = ['바이브코딩'];
  const collab = ['패들렛','캔바','ZEP','블루킷','투닝','띵커벨','멘티미터','Padlet','노션','구글 워크스페이스','MS Teams','왓퀴즈','북크리에이터','Suno'];

  let genCount = 0, courseCount = 0, fbCount = 0, vibeCount = 0, collabCount = 0;
  toolRank.forEach(([name, cnt]) => {
    if (aiGenTools.includes(name)) genCount += cnt;
    else if (aiCourseTools.includes(name)) courseCount += cnt;
    else if (aiFeedbackTools.includes(name)) fbCount += cnt;
    else if (vibecodeTools.includes(name)) vibeCount += cnt;
    else if (collab.includes(name)) collabCount += cnt;
  });

  // 3. Subject frequency
  const subjectCount = {};
  const subjectMap = {
    '수학':0,'영어':0,'과학':0,'국어':0,'정보':0,'사회':0,'도덕':0,
    '기술':0,'체육':0,'역사':0,'미술':0,'음악':0,'진로':0
  };
  visible.forEach(c => {
    const s = c.subject || '';
    Object.keys(subjectMap).forEach(k => {
      if (s.includes(k)) subjectMap[k]++;
    });
  });
  const subjectRank = Object.entries(subjectMap).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]);

  // 4. Level distribution
  const levelCount = {초등:0,중등:0,고등:0};
  visible.forEach(c => { levelCount[c.level]++; });

  // 5. Category by level
  const catLevel = {};
  CATEGORIES.forEach(cat => {
    catLevel[cat.id] = {초등:0,중등:0,고등:0};
    visible.filter(c=>c.cat===cat.id).forEach(c => catLevel[cat.id][c.level]++);
  });

  const barColors = ['var(--cat1)','var(--cat2)','var(--cat3)','var(--cat4)','var(--cat5)','var(--cat6)','var(--cat7)','var(--cat8)','var(--cat9)','var(--cat10)','var(--accent)','var(--cat1)','var(--cat2)','var(--cat3)','var(--cat4)'];

  function renderBars(data, max, limit) {
    return data.slice(0, limit || 15).map(([name, cnt], i) =>
      `<div class="bar-row">
        <span class="bar-label" title="${name}">${name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${(cnt/max*100).toFixed(1)}%;background:${barColors[i % barColors.length]}"></div></div>
        <span class="bar-value">${cnt}</span>
      </div>`
    ).join('');
  }

  // Donut SVG
  function donutSVG(segments, total) {
    const colors = ['var(--cat1)','var(--cat3)','var(--cat4)','var(--cat2)','var(--cat8)'];
    let offset = 0;
    const radius = 52, cx = 70, cy = 70, circumference = 2 * Math.PI * radius;
    let paths = '';
    segments.forEach((seg, i) => {
      const pct = seg.value / total;
      const dashLen = circumference * pct;
      const dashGap = circumference - dashLen;
      paths += `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${colors[i]}" stroke-width="16" stroke-dasharray="${dashLen} ${dashGap}" stroke-dashoffset="${-offset}" stroke-linecap="butt" />`;
      offset += dashLen;
    });
    return `<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(-90deg)">
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="var(--surface-alt)" stroke-width="16"/>
      ${paths}
    </svg>`;
  }

  const aiSegments = [
    {label:'생성형 AI (ChatGPT, Claude, Gemini 등)',value:genCount},
    {label:'AI 코스웨어 (스쿨플랫, 매쓰홀릭 등)',value:courseCount},
    {label:'AI 평가 (클리포, 채움AI 등)',value:fbCount},
    {label:'바이브코딩 도구',value:vibeCount},
    {label:'협업·발표 도구 (패들렛, 캔바 등)',value:collabCount}
  ];
  const aiTotal = aiSegments.reduce((s,x)=>s+x.value,0);
  const donutColors = ['var(--cat1)','var(--cat3)','var(--cat4)','var(--cat2)','var(--cat8)'];

  // Category sizes for budget focus
  const catSizes = CATEGORIES.map(cat => ({
    title: cat.title,
    icon: cat.icon,
    count: visible.filter(c=>c.cat===cat.id).length,
    color: cat.color
  })).sort((a,b)=>b.count-a.count);
  const maxCat = catSizes[0].count;

  const container = document.getElementById('dashboardContainer');
  container.innerHTML = `
    <div class="dash-grid">
      <div class="dash-card">
        <h3><span>🏆</span> 도구 활용 빈도 TOP 15</h3>
        ${renderBars(toolRank, toolRank[0][1], 15)}
      </div>
      <div class="dash-card">
        <h3><span>🤖</span> AI 도구 유형별 활용 비중</h3>
        <div class="donut-row">
          <div class="donut-container">${donutSVG(aiSegments, aiTotal)}</div>
          <div class="donut-legend">
            ${aiSegments.map((seg,i) => `<div class="legend-item"><span class="legend-dot" style="background:${donutColors[i]}"></span>${seg.label}<span class="legend-count">${seg.value}회</span></div>`).join('')}
          </div>
        </div>
        <div class="insight-box"><p><strong>생성형 AI</strong>가 가장 많이 활용되었고, 이어 <strong>AI 코스웨어</strong>(맞춤형 수학 학습)와 <strong>협업·발표 도구</strong>가 뒤를 이었습니다. <strong>바이브코딩</strong>은 올해 새롭게 부상한 트렌드입니다.</p></div>
      </div>
      <div class="dash-card">
        <h3><span>📚</span> 교과별 연구 집중도</h3>
        ${renderBars(subjectRank, subjectRank[0][1], 13)}
        <div class="insight-box"><p><strong>수학</strong>이 압도적으로 많으며, AI 코스웨어의 진단·맞춤학습 기능이 수학 교과에 가장 잘 맞기 때문입니다. <strong>영어·과학·국어</strong>가 뒤를 잇고, <strong>정보·사회</strong>에서도 활발합니다.</p></div>
      </div>
      <div class="dash-card">
        <h3><span>💰</span> 예산·관심 집중 영역 (유목별 사례 수)</h3>
        ${catSizes.map(cs => `<div class="bar-row">
          <span class="bar-label" title="${cs.title}">${cs.icon} ${cs.title.length > 12 ? cs.title.slice(0,12)+'…' : cs.title}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${(cs.count/maxCat*100).toFixed(1)}%;background:var(--cat${cs.color})"></div></div>
          <span class="bar-value">${cs.count}</span>
        </div>`).join('')}
        <div class="insight-box"><p><strong>AI 코스웨어 맞춤학습</strong>과 <strong>생성형 AI 수업</strong>에 예산과 관심이 가장 집중되었습니다. <strong>바이브코딩</strong>은 별도 예산 없이 교사 역량으로 성장한 영역이며, <strong>학교 단위 확산</strong>에도 많은 학교가 투자했습니다.</p></div>
      </div>
      <div class="dash-card full">
        <h3><span>🏫</span> 학교급별 분포</h3>
        <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px">
          <div class="legend-item"><span class="legend-dot" style="background:var(--level-elem)"></span>초등 <span class="legend-count">${levelCount['초등']}교</span></div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--level-mid)"></span>중등 <span class="legend-count">${levelCount['중등']}교</span></div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--level-high)"></span>고등 <span class="legend-count">${levelCount['고등']}교</span></div>
        </div>
        <div style="overflow-x:auto">
        ${CATEGORIES.map(cat => {
          const d = catLevel[cat.id];
          const total = d['초등']+d['중등']+d['고등'];
          if(!total) return '';
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span class="bar-label" style="width:160px" title="${cat.title}">${cat.icon} ${cat.title.length > 14 ? cat.title.slice(0,14)+'…' : cat.title}</span>
            <div class="bar-track" style="display:flex">
              ${d['초등'] ? `<div style="width:${(d['초등']/total*100).toFixed(1)}%;height:100%;background:var(--level-elem);border-radius:4px 0 0 4px" title="초등 ${d['초등']}"></div>` : ''}
              ${d['중등'] ? `<div style="width:${(d['중등']/total*100).toFixed(1)}%;height:100%;background:var(--level-mid)" title="중등 ${d['중등']}"></div>` : ''}
              ${d['고등'] ? `<div style="width:${(d['고등']/total*100).toFixed(1)}%;height:100%;background:var(--level-high);border-radius:0 4px 4px 0" title="고등 ${d['고등']}"></div>` : ''}
            </div>
            <span class="bar-value">${total}</span>
          </div>`;
        }).join('')}
        </div>
        <div class="insight-box"><p><strong>초등학교</strong>가 전체의 절반 이상을 차지하며, AI 코스웨어(수학)와 바이브코딩 영역에서 특히 활발합니다. <strong>중학교</strong>는 평가·피드백 혁신과 바이브코딩에 강세를 보이고, <strong>고등학교</strong>는 프로젝트·융합 수업과 학교 단위 확산에 집중하는 경향이 있습니다.</p></div>
      </div>
    </div>
  `;
}

function init() {
  const container = document.getElementById('categoriesContainer');
  const visible = CASES.filter(c => !c.hidden);
  const readableCount = visible.filter(c => c.summary && !c.summary.includes('미제출')).length;
  document.getElementById('readable-count').textContent = readableCount;
  document.getElementById('participant-count').textContent = visible.length;
  document.getElementById('subtitle-count').textContent = visible.length;

  buildDashboard();

  CATEGORIES.forEach(cat => {
    const cases = visible.filter(c => c.cat === cat.id);
    if (!cases.length) return;
    const section = document.createElement('div');
    section.className = 'category';
    section.dataset.catId = cat.id;

    section.innerHTML = `
      <div class="cat-header" onclick="toggleCategory('${cat.id}')">
        <div class="cat-icon" style="background:var(--cat${cat.color}-bg);color:var(--cat${cat.color})">${cat.icon}</div>
        <span class="cat-title">${cat.title}</span>
        <span class="cat-count">${cases.length}건</span>
        <span class="cat-toggle" id="toggle-${cat.id}">▾</span>
      </div>
      <div class="cat-desc">${cat.desc}</div>
      <div class="case-grid" id="grid-${cat.id}">
        ${cases.map(c => renderCard(c, cat.color)).join('')}
      </div>
    `;
    container.appendChild(section);
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    });
  });

  document.getElementById('searchInput').addEventListener('input', applyFilters);

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });
}

function renderCard(c, color) {
  const levelClass = c.level === '초등' ? 'elem' : c.level === '중등' ? 'mid' : 'high';
  const toolsHtml = c.tools.slice(0, 4).map(t => `<span class="tool-tag">${t}</span>`).join('') +
    (c.tools.length > 4 ? `<span class="tool-tag">+${c.tools.length - 4}</span>` : '');

  return `<div class="case-card" data-level="${c.level}" data-search="${c.school} ${c.title} ${c.summary} ${c.tools.join(' ')} ${c.subject}">
    <div class="card-top">
      <span class="level-badge ${levelClass}">${c.level}</span>
      <span class="card-school">${c.school}</span>
    </div>
    <div class="card-title">${c.title}</div>
    <div class="card-summary">${c.summary}</div>
    <button class="card-expand" onclick="this.previousElementSibling.classList.toggle('expanded');this.textContent=this.textContent==='더 보기'?'접기':'더 보기'">더 보기</button>
    <div class="card-tools">${toolsHtml}</div>
    <div class="card-subject">${c.subject}</div>
  </div>`;
}

function toggleCategory(id) {
  const grid = document.getElementById('grid-' + id);
  const toggle = document.getElementById('toggle-' + id);
  grid.classList.toggle('hidden');
  toggle.classList.toggle('collapsed');
}

function applyFilters() {
  const level = document.querySelector('.filter-btn.active').dataset.level;
  const query = document.getElementById('searchInput').value.toLowerCase().trim();

  document.querySelectorAll('.case-card').forEach(card => {
    const matchLevel = level === 'all' || card.dataset.level === level;
    const matchSearch = !query || card.dataset.search.toLowerCase().includes(query);
    card.style.display = (matchLevel && matchSearch) ? '' : 'none';
  });

  document.querySelectorAll('.category').forEach(cat => {
    const visibleCards = cat.querySelectorAll('.case-card:not([style*="display: none"])');
    const countEl = cat.querySelector('.cat-count');
    countEl.textContent = visibleCards.length + '건';
    cat.style.display = visibleCards.length === 0 ? 'none' : '';
  });
}

init();
</script>
</body>
</html>
